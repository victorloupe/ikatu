<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — iGUi Pranchas</title>
<meta name="theme-color" content="#00AEEF">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=20260615d"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:#e2eaf3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

  .logo-wrap{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
  .logo-text{font-family:'Inter Tight',sans-serif;font-size:22px;font-weight:800;color:#1a2a3a;letter-spacing:.5px;}
  .logo-text span{color:#00AEEF;}
  .logo-badge{background:#1a2a3a;color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase;}

  .card{background:#fff;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.10);padding:40px 44px;width:100%;max-width:400px;}
  .card-title{font-family:'Inter Tight',sans-serif;font-size:20px;font-weight:800;color:#1a2a3a;margin-bottom:4px;}
  .card-sub{font-size:13px;color:#7f8c9a;margin-bottom:28px;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-weight:700;color:#7f8c9a;letter-spacing:.3px;margin-bottom:6px;}
  .field input{width:100%;padding:11px 14px;border:1.5px solid #d0dce8;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:#1a2a3a;outline:none;transition:border-color .15s;}
  .field input:focus{border-color:#00AEEF;}

  .btn-login{width:100%;background:#1a2a3a;color:#fff;border:none;padding:13px;border-radius:8px;font-family:'Inter Tight',sans-serif;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.3px;transition:background .2s;margin-top:8px;}
  .btn-login:hover{background:#00AEEF;}
  .btn-login:disabled{opacity:.5;cursor:not-allowed;}

  .forgot{display:block;text-align:center;margin-top:14px;font-size:12px;color:#7f8c9a;text-decoration:none;}
  .forgot:hover{color:#00AEEF;}

  .error-msg{background:#fdf2f1;border:1px solid #f5c6c2;color:#c0392b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .error-msg.show{display:block;}

  .reset-wrap{display:none;}
  .reset-wrap.show{display:block;}
  .login-wrap.hide{display:none;}

  .back-link{display:block;text-align:center;margin-top:14px;font-size:12px;color:#7f8c9a;cursor:pointer;}
  .back-link:hover{color:#00AEEF;}

  .success-msg{background:#e8f5e9;border:1px solid #c8e6c9;color:#27ae60;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .success-msg.show{display:block;}

  footer{margin-top:24px;font-size:11px;color:#a0b0c0;}

  .remember-row{display:flex;align-items:center;gap:8px;margin-top:4px;margin-bottom:4px;}
  .remember-row input[type=checkbox]{width:15px;height:15px;accent-color:#00AEEF;cursor:pointer;flex-shrink:0;}
  .remember-row label{font-size:12px;color:#7f8c9a;cursor:pointer;user-select:none;font-weight:500;}

  /* ── Tela de abertura (pós-login) ───────────────────────────── */
  .splash{
    position:fixed; inset:0; z-index:9999;
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    background:linear-gradient(165deg,#eef3f9 0%,#e2eaf3 60%,#d8e3f0 100%);
    opacity:0; transition:opacity .4s ease;
  }
  .splash.show{ display:flex; opacity:1; }
  .splash.fade-out{ opacity:0; }
  .splash-logo{
    height:140px; width:auto;
    animation:splashLogo .75s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes splashLogo{
    from{ opacity:0; transform:translateY(16px) scale(.95); }
    to{   opacity:1; transform:translateY(0) scale(1); }
  }
  .splash-welcome{
    font-family:'Inter Tight',sans-serif; font-weight:800; font-size:21px; color:#1a2a3a;
    text-align:center; letter-spacing:.2px;
    opacity:0; animation:splashFade .6s ease .28s both;
  }
  .splash-welcome span{ color:#00AEEF; }
  .splash-sub{
    font-size:12.5px; color:#7f8c9a; margin-top:-14px; font-weight:500;
    opacity:0; animation:splashFade .6s ease .38s both;
  }

  /* Checklist de carregamento */
  .splash-checklist{
    display:flex; flex-direction:column; gap:13px;
    width:280px; max-width:80vw;
    opacity:0; animation:splashFade .6s ease .5s both;
  }
  .splash-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    width:100%;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:600; color:#9aa8b6;
    transition:color .3s ease;
  }
  .splash-item.loading{ color:#5a6a78; }
  .splash-item.done{ color:#1a2a3a; }
  .splash-ic{ position:relative; width:22px; height:22px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; }
  .splash-mini-spin{
    width:18px; height:18px; border-radius:50%;
    border:2.5px solid #dfe7f0; transition:opacity .25s ease;
  }
  .splash-item.loading .splash-mini-spin{
    border-top-color:#00AEEF; animation:splashSpin .5s linear infinite;
  }
  .splash-check{
    position:absolute; inset:0; margin:auto; width:22px; height:22px; color:#22c55e;
    opacity:0; transform:scale(.4);
    transition:opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .splash-item.done .splash-mini-spin{ opacity:0; }
  .splash-item.done .splash-check{ opacity:1; transform:scale(1); }

  /* Barra de progresso */
  .splash-progress-row{
    display:flex; align-items:center; gap:10px;
    width:280px; max-width:80vw; margin-top:4px;
    opacity:0; animation:splashFade .6s ease .6s both;
  }
  .splash-progress{
    flex:1; height:6px; border-radius:999px;
    background:#dfe7f0; overflow:hidden;
  }
  .splash-progress-fill{
    height:100%; width:0; border-radius:999px;
    background:linear-gradient(90deg,#00AEEF,#0a7fb5);
    /* animada quadro a quadro via JS (subida suave) */
  }
  .splash-percent{
    font-family:'Inter',sans-serif; font-size:12px; font-weight:700;
    color:#00AEEF; min-width:38px; text-align:right;
  }

  @keyframes splashFade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  @keyframes splashSpin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){
    .splash-logo,.splash-welcome,.splash-sub,.splash-checklist{ animation:none; opacity:1; }
    .splash-item.loading .splash-mini-spin{ animation:splashSpin 1.2s linear infinite; }
  }
</style>
</head>
<body>

<!-- Tela de abertura (exibida após login bem-sucedido) -->
<div class="splash" id="splashScreen" aria-hidden="true">
  <img src="logo_site.png" alt="iGUi" class="splash-logo">
  <div class="splash-welcome" id="splashWelcome">Bem-vindo!</div>
  <div class="splash-sub">Preparando seu espaço...</div>
  <div class="splash-checklist" id="splashChecklist"></div>
  <div class="splash-progress-row">
    <div class="splash-progress"><div class="splash-progress-fill" id="splashProgress"></div></div>
    <span class="splash-percent" id="splashPercent">0%</span>
  </div>
</div>

<div class="logo-wrap">
  <img src="logo_site.png" alt="iGUi Pranchas" style="height:150px;width:auto;">
</div>

<!-- LOGIN -->
<div class="card" id="loginCard">

  <div class="login-wrap" id="loginWrap">
    <div class="card-title">Entrar</div>
    <div class="card-sub">Acesse com seu e-mail e senha</div>

    <div class="error-msg" id="loginError"></div>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>Usuário / E-mail</label>
        <input type="text" id="loginEmail" placeholder="Ex: milena ou seu@email.com" required autocomplete="username">
      </div>
      <div class="field">
        <label>Senha</label>
        <div style="position: relative;">
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" style="padding-right: 42px;">
          <button type="button" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #7f8c9a; padding: 4px; display: flex; align-items: center; justify-content: center; outline: none; transition: color 0.2s;" onmouseover="this.style.color='#00AEEF'" onmouseout="this.style.color='#7f8c9a'">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Lembrar-me</label>
      </div>
      <button class="btn-login" id="btnLogin" type="submit">Entrar</button>
    </form>

    <a class="forgot" onclick="mostrarReset()">Esqueci minha senha</a>
  </div>

  <!-- RESET DE SENHA -->
  <div class="reset-wrap" id="resetWrap">
    <div class="card-title">Redefinir senha</div>
    <div class="card-sub" style="font-size: 13px; color: #7f8c9a; margin-top: 10px; margin-bottom: 20px; line-height: 1.6;">
      Por favor, entre em contato com o administrador para redefinir a sua senha.
    </div>

    <span class="back-link" onclick="mostrarLogin()" style="margin-top: 24px; font-weight: 600;">← Voltar ao login</span>
  </div>

</div>

<footer>iGUi © 2026 · By: Victor L.</footer>

<script>
  // Se já estiver logado, redireciona
  (async () => {
    const s = await sbGetSession();
    if (s) {
      window.location.href = window.innerWidth <= 768 ? 'pagamentos.html' : 'index.html';
    }
  })();

  // Lembrar-me: preenche o campo se salvo
  (function() {
    const saved = localStorage.getItem('igui_remember_email');
    if (saved) {
      document.getElementById('loginEmail').value = saved;
      document.getElementById('rememberMe').checked = true;
    }
  })();

  async function handleLogin(e) {
    e.preventDefault();
    let email = document.getElementById('loginEmail').value.trim();
    const password  = document.getElementById('loginPassword').value;
    const remember  = document.getElementById('rememberMe').checked;
    const btn       = document.getElementById('btnLogin');
    const errEl     = document.getElementById('loginError');

    // Lembrar-me: salva ou limpa o e-mail
    if (remember) {
      localStorage.setItem('igui_remember_email', email);
    } else {
      localStorage.removeItem('igui_remember_email');
    }

    // Se o usuário digitou apenas o nome de usuário (sem @), adiciona o domínio padrão @igui.com
    if (email && !email.includes('@')) {
      email = email + '@igui.com';
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';
    errEl.classList.remove('show');

    const { error } = await sbSignIn(email, password);
    if (error) {
      errEl.textContent = traduzirErro(error.message);
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    // Verificar se conta está ativa
    const profile = await sbGetProfile();
    if (profile && profile.active === false) {
      await sbSignOut();
      errEl.textContent = 'Conta desativada. Entre em contato com o administrador.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    // Tela de abertura: checklist carregando o sistema e então redireciona
    const nome = profile?.name || email.split('@')[0];
    iniciarSplash(nome, profile?.role === 'admin', () => {
      window.location.href = window.innerWidth <= 768 ? 'pagamentos.html' : 'index.html';
    });
  }

  function iniciarSplash(nome, isAdmin, onDone) {
    // Saudação com nome completo (montada via DOM/textContent — nunca interpretada como HTML)
    const completo = (nome || '').trim();
    const w = document.getElementById('splashWelcome');
    if (w) {
      w.textContent = '';
      if (completo) {
        w.append('Bem-vindo, ');
        const s = document.createElement('span');
        s.textContent = completo;
        w.append(s, '!');
      } else {
        w.textContent = 'Bem-vindo!';
      }
    }

    // Monta o checklist com as partes do menu
    const itens = ['Gerador', 'Pranchas', 'Links', 'Avisos', 'Chat', 'Pagamentos'];
    if (isAdmin) itens.push('Administração');

    const cont = document.getElementById('splashChecklist');
    const rows = [];
    if (cont) {
      cont.textContent = '';
      itens.forEach(label => {
        const row = document.createElement('div');
        row.className = 'splash-item';
        row.innerHTML =
          '<span class="splash-item-lbl"></span>' +
          '<span class="splash-ic">' +
            '<span class="splash-mini-spin"></span>' +
            '<svg class="splash-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>' +
          '</span>';
        row.querySelector('.splash-item-lbl').textContent = label;
        cont.appendChild(row);
        rows.push(row);
      });
    }

    // Exibe a tela
    const splash = document.getElementById('splashScreen');
    if (splash) {
      splash.setAttribute('aria-hidden', 'false');
      splash.classList.add('show');
    }

    // Carrega cada parte em sequência: gira (loading) e então marca ✓ + avança a barra
    const fill = document.getElementById('splashProgress');
    const pctEl = document.getElementById('splashPercent');
    const INICIO = 700;   // espera o checklist aparecer
    const PASSO  = 620;   // intervalo entre cada item
    const CARGA  = 550;   // tempo girando antes do ✓ (≥ uma volta do círculo, que leva .5s)
    rows.forEach((row, i) => {
      setTimeout(() => {
        row.classList.add('loading');
        setTimeout(() => {
          row.classList.remove('loading');
          row.classList.add('done');
        }, CARGA);
      }, INICIO + i * PASSO);
    });

    // Barra/percentual sobem de forma contínua (número a número), não em saltos
    const durProg = (rows.length - 1) * PASSO + CARGA;
    const agoraFn = () => (typeof performance !== 'undefined' ? performance.now() : Date.now());
    const t0 = agoraFn() + INICIO;
    (function tick() {
      let p = (agoraFn() - t0) / durProg;
      if (p < 0) p = 0;
      if (p > 1) p = 1;
      const pct = Math.round(p * 100);
      if (fill) fill.style.width = pct + '%';
      if (pctEl) pctEl.textContent = pct + '%';
      if (p < 1) requestAnimationFrame(tick);
    })();

    const total = INICIO + rows.length * PASSO + 550;
    setTimeout(() => { if (typeof onDone === 'function') onDone(); }, total);
  }

  async function handleReset(e) {
    e.preventDefault();
    const email  = document.getElementById('resetEmail').value.trim();
    const btn    = document.getElementById('btnReset');
    const errEl  = document.getElementById('resetError');
    const sucEl  = document.getElementById('resetSuccess');

    btn.disabled = true;
    btn.textContent = 'Enviando...';
    errEl.classList.remove('show');
    sucEl.classList.remove('show');

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/index.html'
    });

    if (error) {
      errEl.textContent = traduzirErro(error.message);
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Enviar link';
      return;
    }

    sucEl.textContent = 'Link enviado! Verifique seu e-mail.';
    sucEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Enviar link';
  }

  function mostrarReset() {
    document.getElementById('loginWrap').classList.add('hide');
    document.getElementById('resetWrap').classList.add('show');
  }

  function mostrarLogin() {
    document.getElementById('resetWrap').classList.remove('show');
    document.getElementById('loginWrap').classList.remove('hide');
  }

  function traduzirErro(msg) {
    if (!msg) return 'Erro desconhecido.';
    if (msg.includes('Invalid login credentials')) return 'E-mail ou senha incorretos.';
    if (msg.includes('Email not confirmed'))       return 'Confirme seu e-mail antes de entrar.';
    if (msg.includes('Too many requests'))         return 'Muitas tentativas. Aguarde e tente novamente.';
    if (msg.includes('User not found'))            return 'Usuário não encontrado.';
    if (msg.includes('network'))                   return 'Erro de conexão. Verifique sua internet.';
    return msg;
  }

  function togglePasswordVisibility() {
    const input = document.getElementById('loginPassword');
    const eyeIcon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      eyeIcon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      `;
    } else {
      input.type = 'password';
      eyeIcon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    }
  }
</script>
</body>
</html>
