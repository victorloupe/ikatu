<style>
  /* ── Links page ── */
  .links-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .links-search{flex:1;min-width:200px;position:relative;}
  .links-search input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;background:#fff;}
  .links-search input:focus{border-color:var(--blue);}
  .links-search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);}

  .btn-header-action{background:var(--blue);color:#fff;border:none;padding:9px 15px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s;}
  .btn-header-action:hover{background:#0099d4;}
  .btn-header-action.secondary{background:#1a2a3a;}
  .btn-header-action.secondary:hover{background:#263c50;}

  /* ── Folder sections ── */
  .folders-wrap{display:flex;flex-direction:column;gap:10px;}

  .folder-section{border:1.5px solid var(--border);border-radius:12px;background:#fff;overflow:hidden;transition:box-shadow .15s;}
  .folder-section:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);}

  .folder-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background .12s;}
  .folder-header:hover{background:#f4f8fb;}

  .folder-chevron{width:18px;height:18px;flex-shrink:0;color:var(--muted);transition:transform .2s;}
  .folder-chevron.open{transform:rotate(90deg);}

  .folder-icon{font-size:18px;flex-shrink:0;}
  .folder-name{font-size:14px;font-weight:700;color:#1a2a3a;flex:1;}
  .folder-count{font-size:11px;font-weight:600;color:var(--muted);background:#f0f4f7;border-radius:20px;padding:2px 9px;}

  .folder-admin-btns{display:flex;gap:5px;opacity:0;transition:opacity .15s;}
  .folder-header:hover .folder-admin-btns{opacity:1;}
  .btn-folder-action{background:transparent;border:1.5px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;flex-shrink:0;}
  .btn-folder-action:hover{background:#edf7fd;border-color:var(--blue);color:var(--blue);}
  .btn-folder-del:hover{background:#fdf2f1 !important;border-color:#e74c3c !important;color:#e74c3c !important;}

  .folder-body{display:none;padding:0 14px 14px;}
  .folder-body.open{display:block;}

  .folder-add-link{width:100%;background:transparent;border:1.5px dashed var(--border);border-radius:8px;padding:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;margin-bottom:10px;transition:all .15s;}
  .folder-add-link:hover{border-color:var(--blue);color:var(--blue);background:#edf7fd;}

  .links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
  .link-card{background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:7px;transition:box-shadow .15s,border-color .15s;position:relative;}
  .link-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.07);border-color:#b0c4d4;}
  .link-title{font-size:13px;font-weight:700;color:#1a2a3a;line-height:1.3;}
  .link-desc{font-size:12px;color:var(--muted);line-height:1.5;flex:1;}
  .link-url{font-size:11px;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .link-footer{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .btn-open{flex:1;background:#1a2a3a;color:#fff;border:none;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:block;transition:background .15s;}
  .btn-open:hover{background:var(--blue);}
  .link-admin-actions{display:flex;gap:5px;}
  .btn-link-edit,.btn-link-del{background:transparent;border:1.5px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
  .btn-link-edit:hover{background:#edf7fd;border-color:var(--blue);color:var(--blue);}
  .btn-link-del:hover{background:#fdf2f1;border-color:#e74c3c;color:#e74c3c;}

  .empty-folder{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
  .empty-folder .ico{font-size:28px;margin-bottom:8px;}

  .empty-links{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-links .ico{font-size:40px;margin-bottom:12px;}
  .empty-links p{font-size:14px;}

  /* ── Search mode: flat grid ── */
  .flat-grid-wrap .links-grid{margin-top:4px;}

  /* ── Modal ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(18,30,42,.7);z-index:500;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:460px;box-shadow:0 8px 40px rgba(0,0,0,.15);}
  .modal-title{font-size:16px;font-weight:700;color:#1a2a3a;margin-bottom:20px;}
  .modal-field{margin-bottom:14px;}
  .modal-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.3px;margin-bottom:5px;}
  .modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
  .modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--blue);}
  .modal-field textarea{resize:vertical;min-height:70px;}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .btn-modal{padding:9px 20px;border-radius:7px;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border:none;}
  .btn-modal.cancel{background:var(--gray);color:var(--muted);}
  .btn-modal.cancel:hover{background:#d0dce8;}
  .btn-modal.confirm{background:#1a2a3a;color:#fff;}
  .btn-modal.confirm:hover{background:var(--blue);}

  /* ── Icon picker ── */
  .icon-opt{width:36px;height:36px;border-radius:8px;border:1.5px solid transparent;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:7px;color:#5a7a9a;}
  .icon-opt:hover{border-color:#b0c4d4;background:#edf7fd;color:var(--blue);}
  .icon-opt.selected{border-color:var(--blue);background:#e0f4fd;color:var(--blue);}
  .icon-opt svg{width:100%;height:100%;}
  .folder-icon svg{width:18px;height:18px;vertical-align:middle;stroke:#5a7a9a;}
</style>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let todosLinks = [];
let todasCategorias = [];
let isAdminUser = false;
let editandoLinkId = null;
let editandoPastaId = null;
let defaultCatForNewLink = null;

// Track open folders (persisted in sessionStorage)
const OPEN_KEY = 'igui_links_open_folders';
function getOpenFolders() {
  try { return new Set(JSON.parse(sessionStorage.getItem(OPEN_KEY) || '[]')); } catch { return new Set(); }
}
function setOpenFolders(s) {
  sessionStorage.setItem(OPEN_KEY, JSON.stringify([...s]));
}

// ── Toast ──────────────────────────────────────────────
function showToast(msg, tipo = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${tipo} show`;
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── Escape HTML ────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const session = await sbRequireAuth();
  if (!session) return;

  const profile = await sbGetProfile();
  isAdminUser = profile?.role === 'admin';

  const displayName = profile?.name || profile?.email || '—';
  document.getElementById('hdrUser').textContent = displayName;
  const av = document.getElementById('userAvatar');
  if (av && displayName !== '—') {
    const pts = displayName.trim().split(/\s+/);
    av.textContent = ((pts[0]?.[0]||'') + (pts[1]?.[0]||'')).toUpperCase() || '?';
  }
  if (isAdminUser) {
    document.getElementById('adminBadge').style.display = 'inline-block';
    document.getElementById('navAdmin').style.display = 'flex';
    document.getElementById('btnNovoLink').style.display = 'flex';
    document.getElementById('btnNovaPasta').style.display = 'flex';
  }

  if (typeof setLogoImages === 'function') setLogoImages();

  sbVerificarMsgNaoLidas().then(temNova => {
    const badge = document.getElementById('chatNavBadge');
    if (badge) badge.style.display = temNova ? 'block' : 'none';
  }).catch(() => {});

  await carregarTudo();
});

// ── Load data ─────────────────────────────────────────
async function carregarTudo() {
  try {
    const [cats, links] = await Promise.all([
      sbListarCategorias(),
      sbListarLinks()
    ]);
    todasCategorias = cats;
    todosLinks = (links || []).filter(l => l.category !== 'SystemConfig');
    animarPastas = true; // entrada em cascata ao carregar do banco
    renderTudo();
  } catch (e) {
    showToast('Erro ao carregar: ' + e.message, 'err');
    document.getElementById('linksWrap').innerHTML = `
      <div class="empty-links" style="color:#e74c3c;background:#fdf2f1;border-radius:12px;padding:40px 20px;">
        <div class="ico">⚠️</div>
        <p style="margin-bottom:12px">Erro ao carregar: ${escHtml(e.message)}</p>
        <button class="btn-open" style="display:inline-block;width:auto;margin:10px auto 0;background:var(--blue);padding:8px 24px;" onclick="carregarTudo()">Tentar Novamente</button>
      </div>`;
  }
}

// ── Render ────────────────────────────────────────────
function renderTudo() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  if (q) {
    renderBusca(q);
  } else {
    renderPastas();
  }
}

function filtrar() {
  renderTudo();
}

// Search mode: flat grid
function renderBusca(q) {
  const lista = todosLinks.filter(l =>
    l.title.toLowerCase().includes(q) ||
    (l.description || '').toLowerCase().includes(q) ||
    l.url.toLowerCase().includes(q) ||
    (l.category || '').toLowerCase().includes(q)
  );

  const wrap = document.getElementById('linksWrap');

  if (!lista.length) {
    wrap.innerHTML = `<div class="empty-links"><div class="ico">🔍</div><p>Nenhum link encontrado para "<strong>${escHtml(q)}</strong>".</p></div>`;
    return;
  }

  wrap.innerHTML = `<div class="flat-grid-wrap"><div class="links-grid" id="flatGrid"></div></div>`;
  const grid = document.getElementById('flatGrid');
  lista.forEach(link => grid.appendChild(criarCard(link)));
}

// Folder mode
let animarPastas = false; // próxima renderização entra com animação em cascata
function renderPastas() {
  const animar = animarPastas;
  animarPastas = false;
  const wrap = document.getElementById('linksWrap');
  const openSet = getOpenFolders();

  if (!todasCategorias.length && !todosLinks.length) {
    wrap.innerHTML = `<div class="empty-links"><div class="ico">📁</div><p>Nenhuma pasta ainda.${isAdminUser ? ' Clique em <strong>Nova Pasta</strong> para começar.' : ''}</p></div>`;
    return;
  }

  // Build category → links map
  const linksPorCat = {};
  todosLinks.forEach(l => {
    const cat = l.category || 'Geral';
    if (!linksPorCat[cat]) linksPorCat[cat] = [];
    linksPorCat[cat].push(l);
  });

  // Collect all category names (from table + any orphan categories in links)
  const catNomes = new Set(todasCategorias.map(c => c.name));
  Object.keys(linksPorCat).forEach(c => catNomes.add(c));

  // Sort: known categories first (by position), then orphans alphabetically
  const catOrdenadas = [
    ...todasCategorias.map(c => c.name),
    ...[...catNomes].filter(n => !todasCategorias.find(c => c.name === n)).sort()
  ];

  // Remove duplicates
  const seen = new Set();
  const catFinal = catOrdenadas.filter(n => { if (seen.has(n)) return false; seen.add(n); return true; });

  let html = '<div class="folders-wrap">';

  catFinal.forEach((catName, catIdx) => {
    const cat = todasCategorias.find(c => c.name === catName);
    const catId = cat?.id || null;
    const links = linksPorCat[catName] || [];
    const isOpen = openSet.has(catName);
    const animAttr = animar ? ` style="animation-delay:${Math.min(catIdx * 70, 1000)}ms"` : '';

    const adminBtns = isAdminUser ? `
      <div class="folder-admin-btns">
        <button class="btn-folder-action" onclick="event.stopPropagation();abrirModalPasta('${catId || ''}','${escHtml(catName)}')" title="Renomear pasta">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 2l3 3-8 8H3v-3L11 2z"/></svg>
        </button>
        <button class="btn-folder-action btn-folder-del" onclick="event.stopPropagation();confirmarDelPasta('${catId || ''}','${escHtml(catName)}')" title="Excluir pasta">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 4 13 4"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5M4 4l1 9h6l1-9"/></svg>
        </button>
      </div>` : '';

    html += `
      <div class="folder-section${animar ? ' row-entrada' : ''}"${animAttr} id="folder-${escHtml(catName).replace(/\s/g,'_')}">
        <div class="folder-header" onclick="toggleFolder('${escHtml(catName)}')">
          <svg class="folder-chevron ${isOpen ? 'open' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>
          <span class="folder-icon">${FOLDER_ICONS[cat?.icon] || FOLDER_ICONS.folder}</span>
          <span class="folder-name">${escHtml(catName)}</span>
          <span class="folder-count">${links.length} link${links.length !== 1 ? 's' : ''}</span>
          ${adminBtns}
        </div>
        <div class="folder-body ${isOpen ? 'open' : ''}" id="body-${escHtml(catName).replace(/\s/g,'_')}">`;

    if (isAdminUser) {
      html += `<button class="folder-add-link" onclick="abrirModalLink(null,'${escHtml(catName)}')">＋ Adicionar link nesta pasta</button>`;
    }

    if (links.length) {
      html += `<div class="links-grid" id="grid-${escHtml(catName).replace(/\s/g,'_')}"></div>`;
    } else {
      html += `<div class="empty-folder"><div class="ico">🔗</div>Nenhum link nesta pasta.</div>`;
    }

    html += `</div></div>`;
  });

  // If no categories at all
  if (!catFinal.length) {
    html += `<div class="empty-links"><div class="ico">📁</div><p>Nenhuma pasta ainda.${isAdminUser ? ' Clique em <strong>Nova Pasta</strong> para começar.' : ''}</p></div>`;
  }

  html += '</div>';
  wrap.innerHTML = html;

  // Populate grids
  catFinal.forEach(catName => {
    const links = linksPorCat[catName] || [];
    if (!links.length) return;
    const gridEl = document.getElementById('grid-' + catName.replace(/\s/g,'_'));
    if (gridEl) links.forEach(link => gridEl.appendChild(criarCard(link)));
  });
}

function criarCard(link) {
  const card = document.createElement('div');
  card.className = 'link-card';
  const dominio = (() => { try { return new URL(link.url).hostname; } catch { return link.url; } })();
  card.innerHTML = `
    <div class="link-title">${escHtml(link.title)}</div>
    ${link.description ? `<div class="link-desc">${escHtml(link.description)}</div>` : ''}
    <div class="link-url">${escHtml(dominio)}</div>
    <div class="link-footer">
      <a class="btn-open" href="${escHtml(link.url)}" target="_blank" rel="noopener">Abrir →</a>
      ${isAdminUser ? `
        <div class="link-admin-actions">
          <button class="btn-link-edit" onclick="abrirModalLink('${link.id}')" title="Editar">✏️</button>
          <button class="btn-link-del"  onclick="confirmarDelLink('${link.id}')" title="Excluir">🗑</button>
        </div>
      ` : ''}
    </div>
  `;
  return card;
}

// ── Toggle folder open/close ──────────────────────────
function toggleFolder(catName) {
  const openSet = getOpenFolders();
  const key = catName.replace(/\s/g,'_');
  const body = document.getElementById('body-' + key);
  const folder = document.getElementById('folder-' + key);
  if (!body) return;

  const chevron = folder?.querySelector('.folder-chevron');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    chevron?.classList.remove('open');
    openSet.delete(catName);
  } else {
    body.classList.add('open');
    chevron?.classList.add('open');
    openSet.add(catName);
  }
  setOpenFolders(openSet);
}

// ── Populate category <select> ─────────────────────────
function popularSelectCat(selectedValue) {
  const sel = document.getElementById('linkCategory');
  sel.innerHTML = '';
  todasCategorias.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name;
    opt.textContent = c.name;
    if (c.name === selectedValue) opt.selected = true;
    sel.appendChild(opt);
  });
  // Fallback: if selected not in list, add it
  if (selectedValue && !todasCategorias.find(c => c.name === selectedValue)) {
    const opt = document.createElement('option');
    opt.value = selectedValue;
    opt.textContent = selectedValue;
    opt.selected = true;
    sel.appendChild(opt);
  }
}

// ── Link modal ────────────────────────────────────────
function abrirModalLink(id = null, catDefault = null) {
  editandoLinkId = id;
  defaultCatForNewLink = catDefault;
  document.getElementById('modalLinkTitle').textContent = id ? 'Editar Link' : 'Novo Link';

  if (id) {
    const link = todosLinks.find(l => l.id === id);
    document.getElementById('linkTitle').value = link.title;
    document.getElementById('linkUrl').value   = link.url;
    document.getElementById('linkDesc').value  = link.description || '';
    popularSelectCat(link.category);
  } else {
    document.getElementById('linkTitle').value = '';
    document.getElementById('linkUrl').value   = '';
    document.getElementById('linkDesc').value  = '';
    popularSelectCat(catDefault || todasCategorias[0]?.name || 'Geral');
  }
  document.getElementById('linkModal').classList.add('show');
}

async function salvarLink() {
  const title    = document.getElementById('linkTitle').value.trim();
  const url      = document.getElementById('linkUrl').value.trim();
  const category = document.getElementById('linkCategory').value;
  const description = document.getElementById('linkDesc').value.trim();
  if (!title || !url) { showToast('Título e URL são obrigatórios', 'err'); return; }
  try {
    await sbSalvarLink({ title, url, description, category }, editandoLinkId);
    fecharModais();
    await carregarTudo();
    showToast(editandoLinkId ? '✅ Link atualizado!' : '✅ Link adicionado!', 'ok');
  } catch (e) {
    showToast('Erro: ' + e.message, 'err');
  }
}

function renderIconPicker(selected) {
  const wrap = document.getElementById('iconPickerWrap');
  wrap.innerHTML = '';
  Object.keys(FOLDER_ICONS).forEach(key => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'icon-opt' + (key === selected ? ' selected' : '');
    btn.title = key;
    btn.innerHTML = FOLDER_ICONS[key];
    btn.addEventListener('click', () => {
      document.querySelectorAll('#iconPickerWrap .icon-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('pastaIcon').value = key;
    });
    wrap.appendChild(btn);
  });
}

// ── Pasta modal ───────────────────────────────────────
function abrirModalPasta(id = null, name = '') {
  editandoPastaId = id || null;
  document.getElementById('modalPastaTitle').textContent = id ? 'Editar Pasta' : 'Nova Pasta';
  document.getElementById('pastaName').value = name;

  const cat = todasCategorias.find(c => c.id == id);
  const iconAtual = cat?.icon || 'folder';
  document.getElementById('pastaIcon').value = iconAtual;
  renderIconPicker(iconAtual);

  document.getElementById('pastaModal').classList.add('show');
}

async function salvarPasta() {
  const name = document.getElementById('pastaName').value.trim();
  const icon = document.getElementById('pastaIcon').value || 'folder';
  if (!name) { showToast('Informe o nome da pasta', 'err'); return; }
  try {
    await sbSalvarCategoria({ name, position: 0, icon }, editandoPastaId);
    fecharModais();
    await carregarTudo();
    showToast(editandoPastaId ? '✅ Pasta atualizada!' : '✅ Pasta criada!', 'ok');
  } catch (e) {
    showToast('Erro: ' + e.message, 'err');
  }
}

// ── Delete confirmations ──────────────────────────────
function confirmarDelPasta(id, name) {
  document.getElementById('delModalTitle').textContent = 'Excluir Pasta';
  document.getElementById('delModalMsg').textContent = `Tem certeza que deseja excluir a pasta "${name}"? Os links desta pasta serão mantidos sem categoria.`;
  document.getElementById('btnConfirmDel').onclick = async () => {
    try {
      await sbDeletarCategoria(id);
      fecharModais();
      await carregarTudo();
      showToast('🗑 Pasta excluída', 'ok');
    } catch (e) {
      showToast('Erro: ' + e.message, 'err');
    }
  };
  document.getElementById('delModal').classList.add('show');
}

function confirmarDelLink(id) {
  const link = todosLinks.find(l => l.id === id);
  document.getElementById('delModalTitle').textContent = 'Excluir Link';
  document.getElementById('delModalMsg').textContent = `Tem certeza que deseja excluir "${link?.title || 'este link'}"?`;
  document.getElementById('btnConfirmDel').onclick = async () => {
    try {
      await sbDeletarLink(id);
      fecharModais();
      await carregarTudo();
      showToast('🗑 Link excluído', 'ok');
    } catch (e) {
      showToast('Erro: ' + e.message, 'err');
    }
  };
  document.getElementById('delModal').classList.add('show');
}

// ── Close modals ──────────────────────────────────────
function fecharModais() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
  editandoLinkId = null;
  editandoPastaId = null;
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) fecharModais(); });
});
</script>
