<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pranchas — iGUi Space</title>
  <link rel="stylesheet" href="mobile.css?v=202606261041">
  <style>
    /* ── Busca sticky ────────────────────────────── */
    .prancha-search-bar {
      position: sticky;
      top: var(--header-h);
      z-index: 100;
      background: var(--bg);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Lista de linhas ────────────────────────── */
    .prancha-lista {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0 14px;
    }

    .prancha-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 11px 12px;
      margin-top: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .prancha-row:active { box-shadow: 0 1px 4px rgba(0,0,0,.06); }

    /* Thumbnail */
    .prancha-row-thumb {
      width: 72px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      background: #e8eef4;
      display: block;
    }
    .prancha-row-thumb-empty {
      width: 72px;
      height: 52px;
      background: linear-gradient(135deg, #e8eef4 0%, #dde6f0 100%);
      border-radius: 6px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .prancha-row-thumb-empty svg { opacity: 0.35; }

    /* Info */
    .prancha-row-info { flex: 1; min-width: 0; }

    .prancha-row-os {
      font-family: 'Inter Tight', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: var(--blue);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prancha-row-modelo {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .prancha-row-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }
    .prancha-row-tag {
      font-size: 10px;
      color: var(--muted);
      background: var(--gray);
      border-radius: 20px;
      padding: 2px 7px;
      white-space: nowrap;
    }
    .prancha-row-tag.projetista {
      color: var(--blue);
      background: #edf7fd;
    }

    /* Chevron */
    .prancha-row-chevron {
      color: var(--border);
      flex-shrink: 0;
    }

    /* ── Brand colors ───────────────────────────── */
    .prancha-row-igui   { border-left: 3px solid #00AEEF; background: #f0f8ff; }
    .prancha-row-splash { border-left: 3px solid #e91e8c; background: #fff0f7; }
    .prancha-row-igui:active   { background: #e4f3fc; }
    .prancha-row-splash:active { background: #fce4f2; }

    .prancha-brand-bar {
      display: flex;
      gap: 8px;
      padding: 8px 14px 4px;
      background: var(--bg);
    }
    .prancha-brand-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--brand-color, #ccc);
      font-size: 12px;
      font-weight: 700;
      color: var(--brand-color, #888);
      background: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .prancha-brand-pill.active {
      background: var(--brand-color, #888);
      color: #fff;
    }
    .pb-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--brand-color, #888);
      flex-shrink: 0;
    }
    .prancha-brand-pill.active .pb-dot { background: #fff; }
    .prancha-row-tag.brand-igui   { color: #0090cc; background: #e4f3fc; }
    .prancha-row-tag.brand-splash { color: #c0186f; background: #fce4f2; }

    /* ── Paginação ───────────────────────────────── */
    .prancha-paginacao {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 14px 4px;
    }
    .prancha-pag-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
    }
    .prancha-pag-btn:disabled { opacity: 0.35; cursor: default; }
    .prancha-pag-btn:not(:disabled):active { background: var(--gray); }
    .prancha-pag-info {
      font-family: 'Inter Tight', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      min-width: 56px;
      text-align: center;
    }

    /* ── Modal viewer ────────────────────────────── */
    .prancha-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 500;
      flex-direction: column;
    }
    .prancha-modal-overlay.open { display: flex; }

    .prancha-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--dark);
      flex-shrink: 0;
      gap: 10px;
    }
    .prancha-modal-title {
      font-family: 'Inter Tight', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .prancha-modal-sub {
      font-size: 11px;
      color: rgba(255,255,255,.5);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prancha-modal-close {
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 20px;
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .prancha-modal-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .prancha-full-img {
      max-width: 100%;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }

    .prancha-modal-footer {
      padding: 12px 16px;
      background: var(--dark);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      flex-direction: column;
    }
    .prancha-pdf-note {
      font-size: 11px;
      color: rgba(255,255,255,.4);
      text-align: center;
    }

    /* ── Skeleton ────────────────────────────────── */
    .prancha-skel-lista { padding: 0 14px; }
    .prancha-skel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 11px 12px;
      margin-top: 10px;
      box-shadow: var(--shadow);
    }
    .prancha-skel-thumb { width: 72px; height: 52px; border-radius: 6px; flex-shrink: 0; }
    .prancha-skel-info { flex: 1; }
    .prancha-skel-line { height: 10px; border-radius: 5px; margin-bottom: 6px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="m-header">
    <img src="../logo_site.png" alt="iGUi Space" class="m-header-logo">
    
    <div class="m-header-right">
      <a class="m-header-user" id="mHeaderUser" href="perfil.html"></a>
    </div>
  </header>

  <!-- Busca -->
  <div class="prancha-search-bar">
    <div class="m-search">
      <svg class="m-search-icon" viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3"/></svg>
      <input type="search" id="campoBusca" placeholder="OS, modelo, loja, projetista…" oninput="buscar(this.value)">
    </div>
  </div>

  <!-- Filtros de marca -->
  <div class="prancha-brand-bar" id="brandBar"></div>

  <!-- Conteúdo -->
  <div class="m-content">
    <div id="pranchaLista"></div>
  </div>

  <!-- Modal viewer -->
  <div class="prancha-modal-overlay" id="viewerModal">
    <div class="prancha-modal-header">
      <div style="flex:1;min-width:0;">
        <div class="prancha-modal-title" id="viewerTitle"></div>
        <div class="prancha-modal-sub" id="viewerSub"></div>
      </div>
      <button class="prancha-modal-close" onclick="fecharViewer()">✕</button>
    </div>
    <div class="prancha-modal-body" id="viewerBody"></div>
    <div class="prancha-modal-footer">
      <a class="m-btn m-btn-secondary m-btn-full" id="viewerDownloadBtn" href="#" download style="justify-content:center">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 13h10"/></svg>
        Baixar imagem
      </a>
      <div class="prancha-pdf-note">PDF disponível apenas no desktop</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="m-toast" id="mToastGlobal"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase-client.js?v=202606261041"></script>
  <script src="mobile-nav.js?v=202606261041"></script>
  <script>
  // ══════════════════════════════════════════════
  // Pranchas Mobile — layout em linhas + cache 5min
  // ══════════════════════════════════════════════

  const CACHE_KEY = 'igui_pranchas_cache_v2';
  const CACHE_TTL = 5 * 60 * 1000; // 5 minutos

  let todasPranchas = [];
  let buscaAtual    = '';
  let filtroBrand   = '';   // '' | 'iGUI' | 'Splash'
  let paginaAtual   = 1;
  const POR_PAGINA  = 8;

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatarData(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' });
    } catch(_) { return ''; }
  }

  // ── Cache ────────────────────────────────────
  function salvarCache(dados) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), dados }));
    } catch(_) {}
  }

  function lerCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const { ts, dados } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) return null; // expirado
      return dados;
    } catch(_) { return null; }
  }

  function invalidarCache() {
    try { localStorage.removeItem(CACHE_KEY); } catch(_) {}
  }

  // ── Pull-to-refresh ──────────────────────────
  window.ptrRecarregar = () => {
    invalidarCache();
    carregarPranchas();
  };

  // ── Filtro ──────────────────────────────────
  function filtrar(lista) {
    let r = lista;
    if (filtroBrand) r = r.filter(p => (p.brand || 'iGUI') === filtroBrand);
    if (buscaAtual) {
      const q = buscaAtual.toLowerCase();
      r = r.filter(p =>
        (p.project_code  || '').toLowerCase().includes(q) ||
        (p.model         || '').toLowerCase().includes(q) ||
        (p.store         || '').toLowerCase().includes(q) ||
        (p.client_name   || '').toLowerCase().includes(q) ||
        (p.created_by    || '').toLowerCase().includes(q)
      );
    }
    return r;
  }

  function buscar(valor) {
    buscaAtual = valor.trim().toLowerCase();
    paginaAtual = 1;
    renderLista(todasPranchas);
  }

  function renderBrandBar() {
    const bar = document.getElementById('brandBar');
    if (!bar) return;
    const brands = [
      { value: 'iGUI',   label: 'iGUi',   color: '#00AEEF' },
      { value: 'Splash', label: 'Splash', color: '#e91e8c' },
    ];
    bar.innerHTML = '';
    brands.forEach(({ value, label, color }) => {
      const btn = document.createElement('button');
      btn.className = 'prancha-brand-pill' + (filtroBrand === value ? ' active' : '');
      btn.style.setProperty('--brand-color', color);
      btn.innerHTML = `<span class="pb-dot"></span>${label}`;
      btn.onclick = () => {
        filtroBrand = (filtroBrand === value) ? '' : value;
        paginaAtual = 1;
        renderBrandBar();
        renderLista(todasPranchas);
      };
      bar.appendChild(btn);
    });
  }

  // ── Skeleton ────────────────────────────────
  function mostrarSkeleton() {
    const el = document.getElementById('pranchaLista');
    el.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'prancha-skel-lista';
    for (let i = 0; i < 6; i++) {
      wrap.innerHTML += `
        <div class="prancha-skel-row">
          <div class="prancha-skel-thumb m-skel"></div>
          <div class="prancha-skel-info">
            <div class="prancha-skel-line m-skel" style="width:45%"></div>
            <div class="prancha-skel-line m-skel" style="width:70%"></div>
            <div class="prancha-skel-line m-skel" style="width:55%"></div>
          </div>
        </div>`;
    }
    el.appendChild(wrap);
  }

  // ── Render ──────────────────────────────────
  function renderLista(lista) {
    const el = document.getElementById('pranchaLista');
    el.innerHTML = '';

    const filtradas = filtrar(lista);
    if (!filtradas.length) {
      el.innerHTML = `<div class="m-empty" style="padding-top:40px">
        <div class="m-empty-icon">
          <svg viewBox="0 0 40 40" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="28" height="32" rx="3"/><path d="M12 14h16M12 20h16M12 26h10"/></svg>
        </div>
        <div class="m-empty-title">Nenhuma prancha encontrada</div>
        <div class="m-empty-sub">Tente ajustar a busca ou crie uma nova prancha no desktop</div>
      </div>`;
      return;
    }

    const total  = filtradas.length;
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const fim    = Math.min(inicio + POR_PAGINA, total);
    const pagina = filtradas.slice(inicio, fim);

    const listaEl = document.createElement('div');
    listaEl.className = 'prancha-lista';

    pagina.forEach((p, i) => {
      const globalIdx = inicio + i;

      const thumb = p.thumbnail_url
        ? `<img class="prancha-row-thumb" src="${esc(p.thumbnail_url)}" alt="" loading="lazy">`
        : `<div class="prancha-row-thumb-empty">
             <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
               <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18"/>
             </svg>
           </div>`;

      const brand      = p.brand || 'iGUI';
      const isSplash   = brand === 'Splash';
      const brandClass = isSplash ? 'prancha-row-splash' : 'prancha-row-igui';
      const brandTag   = isSplash ? 'brand-splash' : 'brand-igui';

      const tags = [];
      const dataFmt = formatarData(p.proj_date);
      if (dataFmt)      tags.push(`<span class="prancha-row-tag">${esc(dataFmt)}</span>`);
      if (p.created_by) tags.push(`<span class="prancha-row-tag projetista">${esc(p.created_by)}</span>`);
      if (p.store)      tags.push(`<span class="prancha-row-tag">${esc(p.store)}</span>`);
      tags.push(`<span class="prancha-row-tag ${brandTag}">${esc(brand)}</span>`);

      listaEl.innerHTML += `
        <div class="prancha-row ${brandClass}" onclick="abrirViewer(${globalIdx})">
          ${thumb}
          <div class="prancha-row-info">
            <div class="prancha-row-os">${esc(p.project_code || 'Sem OS')}</div>
            <div class="prancha-row-modelo">${esc(p.model || p.client_name || '—')}</div>
            <div class="prancha-row-tags">${tags.join('')}</div>
          </div>
          <div class="prancha-row-chevron">
            <svg viewBox="0 0 8 14" width="8" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l6 6-6 6"/></svg>
          </div>
        </div>`;
    });

    el.appendChild(listaEl);

    if (total > POR_PAGINA) {
      const totalPags = Math.ceil(total / POR_PAGINA);
      const pagEl = document.createElement('div');
      pagEl.className = 'prancha-paginacao';
      pagEl.innerHTML = `
        <button class="prancha-pag-btn" onclick="irPagina(${paginaAtual - 1})" ${paginaAtual === 1 ? 'disabled' : ''}>
          <svg viewBox="0 0 8 14" width="8" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1L1 7l6 6"/></svg>
        </button>
        <span class="prancha-pag-info">${paginaAtual} / ${totalPags}</span>
        <button class="prancha-pag-btn" onclick="irPagina(${paginaAtual + 1})" ${paginaAtual === totalPags ? 'disabled' : ''}>
          <svg viewBox="0 0 8 14" width="8" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l6 6-6 6"/></svg>
        </button>`;
      el.appendChild(pagEl);
    }
  }

  function irPagina(n) {
    const totalPags = Math.ceil(filtrar(todasPranchas).length / POR_PAGINA);
    if (n < 1 || n > totalPags) return;
    paginaAtual = n;
    renderLista(todasPranchas);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Viewer ───────────────────────────────────
  function abrirViewer(globalIdx) {
    const lista = filtrar(todasPranchas);
    const p = lista[globalIdx];
    if (!p) return;

    document.getElementById('viewerTitle').textContent = p.project_code || 'Prancha';
    document.getElementById('viewerSub').textContent   =
      [p.model, p.store, p.client_name].filter(Boolean).join(' · ');

    const body = document.getElementById('viewerBody');
    body.innerHTML = p.thumbnail_url
      ? `<img class="prancha-full-img" src="${esc(p.thumbnail_url)}" alt="">`
      : `<div style="color:rgba(255,255,255,.4);font-size:13px;padding:40px 0;text-align:center">Sem pré-visualização disponível</div>`;

    const dlBtn = document.getElementById('viewerDownloadBtn');
    if (p.thumbnail_url) {
      dlBtn.href     = p.thumbnail_url;
      dlBtn.download = (p.project_code || 'prancha') + '.jpg';
      dlBtn.style.display = '';
    } else {
      dlBtn.style.display = 'none';
    }

    document.getElementById('viewerModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function fecharViewer() {
    document.getElementById('viewerModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('viewerModal').addEventListener('click', e => {
    if (e.target.id === 'viewerModal' || e.target.id === 'viewerBody') fecharViewer();
  });

  // ── Carregar ─────────────────────────────────
  async function carregarPranchas() {
    const cached = lerCache();
    if (cached) {
      todasPranchas = cached;
      renderLista(todasPranchas);
      return;
    }

    mostrarSkeleton();

    try {
      // Aguarda supabase-client.js carregar
      await new Promise(r => {
        if (typeof sbListarProjetos === 'function') return r();
        const t = setInterval(() => {
          if (typeof sbListarProjetos === 'function') { clearInterval(t); r(); }
        }, 100);
        setTimeout(() => { clearInterval(t); r(); }, 8000);
      });

      if (typeof sbListarProjetos !== 'function') throw new Error('sbListarProjetos indisponível');

      const dados = await sbListarProjetos();
      todasPranchas = dados;
      salvarCache(dados);
      renderLista(todasPranchas);
    } catch (e) {
      console.error('Erro ao carregar pranchas:', e);
      document.getElementById('pranchaLista').innerHTML = `
        <div class="m-empty" style="padding-top:40px">
          <div class="m-empty-icon">⚠️</div>
          <div class="m-empty-title">Erro ao carregar</div>
          <div class="m-empty-sub">Verifique sua conexão e tente novamente</div>
          <button class="m-btn m-btn-secondary" style="margin-top:16px" onclick="invalidarCache();carregarPranchas()">Tentar novamente</button>
        </div>`;
    }
  }

  // ── Init ─────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => { renderBrandBar(); carregarPranchas(); });

  </script>
</body>
</html>
