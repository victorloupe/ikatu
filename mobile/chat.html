<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat — iGUi Space</title>
  <script src="https://cdn.jsdelivr.net/npm/stream-chat@8/dist/browser.full-bundle.min.js"></script>
  <link rel="stylesheet" href="../styles.css?v=202606261041">
  <link rel="stylesheet" href="mobile.css?v=202606261041">
  <style>
    header { display: none !important; }
    .sidebar { display: none !important; }
    .layout { padding-left: 0 !important; display: block !important; }
    .main-content { padding-top: var(--header-h) !important; padding-bottom: calc(var(--nav-h) + 8px) !important; }

    /* Chat já tem lógica mobile (mobile-conv) — só ajusta altura */
    .chat-wrap { height: calc(100vh - var(--header-h) - var(--nav-h)); }

    /* Botão voltar sempre visível no mobile */
    #chatBackBtn { display: inline-flex !important; }

    #adminBadge, #navAdmin, #hdrUser, #userAvatar { display: none !important; }
  </style>
</head>
<body>

  <header class="m-header" style="display:flex !important;">
    <img src="../logo_site.png" alt="iGUi Space" class="m-header-logo">
    
    <div class="m-header-right">
      <a class="m-header-user" id="mHeaderUser" href="perfil.html"></a>
    </div>
  </header>

  <!-- Elementos fantasmas exigidos pelo chat.js -->
  <span id="hdrUser"    style="display:none"></span>
  <span id="userAvatar" style="display:none"></span>
  <span id="adminBadge" style="display:none"></span>
  <a    id="navAdmin"   style="display:none" href="../admin.html"></a>

  <div class="layout">
    <div class="main-content" style="padding:0;overflow:hidden;">
      <div class="chat-wrap" id="chatWrap">

        <!-- Lista de pessoas (coluna esquerda) -->
        <div class="chat-left" id="chatLeft">
          <div class="chat-section-label">MENSAGENS DIRETAS</div>
          <div id="dmUserList">
            <div class="dm-list-skel" id="dmListSkel">
              <div class="dm-skel-row"><div class="dm-skel-av"></div><div class="dm-skel-ln"></div></div>
              <div class="dm-skel-row"><div class="dm-skel-av"></div><div class="dm-skel-ln" style="width:60%"></div></div>
              <div class="dm-skel-row"><div class="dm-skel-av"></div><div class="dm-skel-ln" style="width:75%"></div></div>
            </div>
          </div>
        </div>

        <!-- Área de mensagens (coluna direita) -->
        <div class="chat-right" id="chatRight">

          <div class="chat-empty" id="chatEmpty">
            <div class="chat-empty-ico">
              <svg width="46" height="46" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 4.5A1.5 1.5 0 0 1 3.5 3h9A1.5 1.5 0 0 1 14 4.5v5A1.5 1.5 0 0 1 12.5 11H6l-3 2.5V11H3.5A1.5 1.5 0 0 1 2 9.5z"/>
              </svg>
            </div>
            <div class="chat-empty-title">Suas conversas</div>
            <div class="chat-empty-sub" id="chatEmptySub">Escolha alguém da equipe para conversar.</div>
          </div>

          <div class="chat-conv" id="chatConv" style="display:none;flex:1;flex-direction:column;min-height:0;position:relative;">
            <div class="chat-drop-overlay" id="dropOverlay">
              <div class="chat-drop-box">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
                <span>Solte para enviar</span>
              </div>
            </div>
            <div class="chat-area-header">
              <button class="chat-back-btn" id="chatBackBtn" onclick="voltarParaLista()" title="Voltar">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>
              </button>
              <div class="chat-dm-avatar" id="chatPeerAvatar" style="width:34px;height:34px;font-size:12px;">?</div>
              <div style="min-width:0;">
                <div class="chat-area-title" id="chatPeerName" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">—</div>
                <div class="chat-area-sub" id="chatPeerStatus" style="margin-left:0;">Mensagem direta</div>
              </div>
            </div>

            <div class="msg-container" id="msgContainer">
              <button class="btn-load-more" id="btnLoadMore" style="display:none" onclick="carregarMais()">Carregar mensagens anteriores</button>
              <div id="msgList"></div>
            </div>

            <div class="chat-input-wrap">
              <div class="attach-preview-bar" id="attachPreview" style="display:none;"></div>
              <div class="chat-input-bar">
                <input type="file" id="fileInput" multiple style="display:none;" onchange="anexarArquivos(this)">
                <button class="btn-attach" id="btnAttach" onclick="document.getElementById('fileInput').click()" title="Anexar">
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7.2l-5.6 5.6a3 3 0 0 1-4.24-4.24l6-6a2 2 0 0 1 2.83 2.83l-6 6a1 1 0 0 1-1.42-1.42L9.6 4.9"/></svg>
                </button>
                <textarea id="chatInput" class="chat-textarea" placeholder="Mensagem..." rows="1" oninput="autoResizeInput(this)" onkeydown="onInputKeydown(event)"></textarea>
                <button class="btn-send-msg" onclick="enviarMensagem()" title="Enviar">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2l12 6-12 6V9.5L10 8 2 6.5V2z"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="chat-conn-error" id="chatConnError" style="display:none;">
            <span id="chatConnErrorMsg">Não foi possível conectar ao chat.</span>
            <button onclick="location.reload()">Tentar de novo</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="editMsgModal">
    <div class="modal-box" style="max-width:440px;">
      <div class="modal-title">Editar mensagem</div>
      <div class="modal-field" style="margin-bottom:16px;">
        <textarea id="editMsgContent" rows="4" placeholder="Conteúdo..." style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;resize:vertical;box-sizing:border-box;"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-modal cancel" onclick="fecharModais()">Cancelar</button>
        <button class="btn-modal confirm" onclick="confirmarEditarMsg()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteMsgModal">
    <div class="modal-box" style="max-width:360px;">
      <div class="modal-title">Apagar mensagem</div>
      <p style="font-size:14px;color:var(--muted);margin:10px 0 20px;line-height:1.6">Tem certeza que deseja apagar esta mensagem?</p>
      <div class="modal-footer">
        <button class="btn-modal cancel" onclick="fecharModais()">Cancelar</button>
        <button class="btn-modal confirm" style="background:#e74c3c" onclick="confirmarDeleteMsg()">Apagar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase-client.js?v=202606261041"></script>
  <script src="mobile-nav.js?v=202606261041"></script>
  <script src="../chat.js?v=202606261041"></script>
</body>
</html>
