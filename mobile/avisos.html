<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Avisos — iGUi Space</title>
  <!-- Estilos do chat/avisos (área de conteúdo) -->
  <link rel="stylesheet" href="../styles.css?v=202606261041">
  <!-- Sobrescreve layout com mobile -->
  <link rel="stylesheet" href="mobile.css?v=202606261041">
  <style>
    /* Remove layout desktop */
    header { display: none !important; }
    .sidebar { display: none !important; }
    .layout { padding-left: 0 !important; display: block !important; }
    .main-content { padding-top: var(--header-h) !important; padding-bottom: calc(var(--nav-h) + 8px) !important; }

    /* Chat ocupa tudo */
    .chat-wrap { height: calc(100vh - var(--header-h) - var(--nav-h)); }
    .chat-left { display: none !important; }
    .chat-right { width: 100% !important; border-left: none !important; }

    /* Input area — sobe acima do nav */
    .chat-input-wrap {
      padding-bottom: 8px !important;
    }

    /* Toolbar de formatação — scroll horizontal no mobile */
    .chat-format-toolbar {
      flex-wrap: nowrap !important;
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    /* Esconde IDs que não existem no mobile */
    #adminBadge, #navAdmin { display: none !important; }
    #hdrUser, #userAvatar { display: none !important; }
  </style>
</head>
<body>

  <!-- Header mobile -->
  <header class="m-header" style="display:flex !important;">
    <img src="../logo_site.png" alt="iGUi Space" class="m-header-logo">
    
    <div class="m-header-right">
      <a class="m-header-user" id="mHeaderUser" href="perfil.html"></a>
    </div>
  </header>

  <!-- Elementos "fantasmas" que o avisos.js precisa mas não serão visíveis -->
  <span id="hdrUser"    style="display:none"></span>
  <span id="userAvatar" style="display:none"></span>
  <span id="adminBadge" style="display:none"></span>
  <a    id="navAdmin"   style="display:none" href="../admin.html"></a>

  <!-- Layout (sem sidebar) -->
  <div class="layout">
    <div class="main-content" style="padding:0;overflow:hidden;">
      <div class="chat-wrap">

        <!-- Coluna esquerda oculta — mantida p/ avisos.js não quebrar -->
        <div class="chat-left" style="display:none !important;">
          <div id="channelList">
            <button class="chat-ch-item" id="btnGeral" onclick="selecionarCanal(null, 'public', '#geral')">
              <span>geral</span>
            </button>
          </div>
          <div id="dmList"></div>
        </div>

        <!-- Área de mensagens -->
        <div class="chat-right">
          <div class="chat-area-header">
            <div class="chat-area-title" id="chatAreaTitle">📢 Mural de Avisos</div>
            <div class="chat-area-sub" id="chatAreaSub">Avisos e comunicados importantes</div>
          </div>

          <div class="pin-banner" id="pinBanner" style="display:none;cursor:pointer;" onclick="irParaMensagemFixada(event)">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 1.5l5 5-3 1-4 4-1 3-3-3 4-4 1-3 1-3z"/><path d="M2 14l3.5-3.5"/></svg>
            <span id="pinBannerText" style="flex:1;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;"></span>
            <button class="pin-banner-close" id="btnDesafixar" onclick="desafixarMsgEvent(event)" style="position:relative;z-index:10;">✕</button>
          </div>

          <div class="msg-container" id="msgContainer">
            <button class="btn-load-more" id="btnLoadMore" style="display:none" onclick="carregarMais()">Carregar mensagens anteriores</button>
            <div id="msgList">
              <div class="chat-skeleton">
                <div class="chat-skel-row"><div class="chat-skel-avatar"></div><div class="chat-skel-lines"><div class="chat-skel-line" style="width:70%"></div><div class="chat-skel-line" style="width:45%"></div></div></div>
                <div class="chat-skel-row"><div class="chat-skel-avatar"></div><div class="chat-skel-lines"><div class="chat-skel-line" style="width:85%"></div><div class="chat-skel-line" style="width:60%"></div></div></div>
                <div class="chat-skel-row"><div class="chat-skel-avatar"></div><div class="chat-skel-lines"><div class="chat-skel-line" style="width:55%"></div></div></div>
              </div>
            </div>
          </div>

          <div class="chat-input-wrap">
            <div class="chat-format-toolbar" style="display:flex;gap:6px;margin-bottom:6px;align-items:center;">
              <button onclick="formatarInputText('bold')"      style="background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;font-weight:bold;font-size:12px;cursor:pointer;color:var(--text);flex-shrink:0">N</button>
              <button onclick="formatarInputText('italic')"    style="background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;font-style:italic;font-size:12px;cursor:pointer;color:var(--text);flex-shrink:0">I</button>
              <button onclick="formatarInputText('underline')" style="background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;text-decoration:underline;font-size:12px;cursor:pointer;color:var(--text);flex-shrink:0">S</button>
              <button onclick="formatarInputText('bullet')"    style="background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:var(--muted);flex-shrink:0">• Tópico</button>
            </div>
            <div class="chat-input-bar">
              <textarea id="chatInput" class="chat-textarea" placeholder="Mensagem..." rows="1" oninput="autoResizeInput(this)" onkeydown="onInputKeydown(event)"></textarea>
              <button class="btn-schedule-msg" id="btnSchedule" style="display:none" onclick="abrirModalAgendar()" title="Agendar">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
              </button>
              <button class="btn-send-msg" onclick="enviarMensagem()" title="Enviar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2l12 6-12 6V9.5L10 8 2 6.5V2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Modal: agendar -->
  <div class="modal-overlay" id="scheduleModal">
    <div class="modal-box" style="max-width:440px;">
      <div class="modal-title">Agendar Mensagem</div>
      <div class="modal-field">
        <label>Mensagem</label>
        <textarea id="scheduleContent" rows="3" placeholder="Conteúdo da mensagem..." style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;resize:vertical;"></textarea>
      </div>
      <div class="modal-field">
        <label>Data e hora de envio</label>
        <input type="datetime-local" id="scheduleAt" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;">
      </div>
      <div class="modal-footer">
        <button class="btn-modal cancel" onclick="fecharModais()">Cancelar</button>
        <button class="btn-modal confirm" onclick="confirmarAgendar()">Agendar</button>
      </div>
    </div>
  </div>

  <!-- Modal: fixar -->
  <div class="modal-overlay" id="pinModal">
    <div class="modal-box" style="max-width:400px;">
      <div class="modal-title">Fixar Mensagem</div>
      <div class="modal-field">
        <label>Expiração (opcional)</label>
        <input type="datetime-local" id="pinUntilInput" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;">
      </div>
      <div class="modal-footer">
        <button class="btn-modal cancel" onclick="fecharModais()">Cancelar</button>
        <button class="btn-modal confirm" onclick="confirmarPin()">Fixar</button>
      </div>
    </div>
  </div>

  <!-- Modal: apagar -->
  <div class="modal-overlay" id="deleteMsgModal">
    <div class="modal-box" style="max-width:360px;">
      <div class="modal-title">Apagar Mensagem</div>
      <p id="deleteMsgDesc" style="font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6">Apagar esta mensagem? Ela ficará visível como "mensagem apagada".</p>
      <div class="modal-footer">
        <button class="btn-modal cancel" onclick="fecharModais()">Cancelar</button>
        <button class="btn-modal confirm" style="background:#e74c3c" onclick="confirmarDeleteMsg()">Apagar</button>
      </div>
    </div>
  </div>

  <!-- Modal: editar -->
  <div class="modal-overlay" id="editMsgModal">
    <div class="modal-box" style="max-width:440px;">
      <div class="modal-title">Editar Mensagem</div>
      <div class="modal-field" style="margin-bottom:16px;">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px;">Conteúdo</label>
        <textarea id="editMsgContent" rows="4" placeholder="Conteúdo..." style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;resize:vertical;box-sizing:border-box;"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-modal cancel" onclick="fecharModais()">Cancelar</button>
        <button class="btn-modal confirm" onclick="confirmarEditarMsg()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase-client.js?v=202606261041"></script>
  <script src="mobile-nav.js?v=202606261041"></script>
  <script src="../avisos.js?v=202606261041"></script>
</body>
</html>
